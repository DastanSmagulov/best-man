<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Altemir, Will You Be My Best Man?</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #1a1a2e;
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* ===== INTRO ===== */
        .intro-screen {
            position: fixed;
            inset: 0;
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }
        .intro-screen.hidden { opacity: 0; visibility: hidden; }

        .intro-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 6vw, 4.5rem);
            font-weight: 900;
            text-align: center;
            line-height: 1.2;
            opacity: 0;
            animation: fadeUp 1s 0.5s forwards;
        }
        .intro-title .yellow { color: #f5c518; }

        .umbrella {
            font-size: 5rem;
            margin: 30px 0;
            opacity: 0;
            animation: fadeUp 1s 1s forwards, float 3s 2s ease-in-out infinite;
            filter: brightness(0) saturate(100%) invert(78%) sepia(68%) saturate(1000%) hue-rotate(358deg) brightness(102%) contrast(97%);
        }

        .enter-btn {
            padding: 16px 48px;
            background: transparent;
            border: 2px solid #f5c518;
            color: #f5c518;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            opacity: 0;
            animation: fadeUp 1s 1.5s forwards;
            transition: all 0.3s ease;
        }
        .enter-btn:hover { background: #f5c518; color: #1a1a2e; }

        /* ===== MAIN ===== */
        .main-content { display: none; }
        .main-content.visible { display: block; }

        /* ===== TITLE CARD ===== */
        .title-card {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            padding: 40px 20px;
            position: relative;
            overflow: hidden;
        }
        .title-card::before {
            content: '';
            position: absolute;
            inset: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle at center, rgba(245,197,24,0.05) 0%, transparent 50%);
            animation: rotateGlow 20s linear infinite;
        }
        @keyframes rotateGlow { to { transform: rotate(360deg); } }

        .himym-logo { position: relative; z-index: 1; text-align: center; }
        .himym-how {
            font-weight: 300;
            font-size: clamp(0.9rem, 2vw, 1.2rem);
            letter-spacing: 8px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.6);
            margin-bottom: 10px;
        }
        .himym-main-title {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-size: clamp(3rem, 10vw, 8rem);
            line-height: 0.95;
            color: #f5c518;
            text-shadow: 0 0 60px rgba(245,197,24,0.3);
        }
        .himym-sub {
            font-weight: 300;
            font-size: clamp(0.9rem, 2vw, 1.2rem);
            letter-spacing: 8px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.6);
            margin-top: 10px;
        }
        .himym-umbrella-large {
            font-size: clamp(4rem, 12vw, 10rem);
            margin-top: 30px;
            position: relative;
            z-index: 1;
            filter: brightness(0) saturate(100%) invert(78%) sepia(68%) saturate(1000%) hue-rotate(358deg) brightness(102%) contrast(97%) drop-shadow(0 0 40px rgba(245,197,24,0.4));
        }

        /* ===== STORY ===== */
        .story-section {
            padding: 80px 20px;
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
            opacity: 0;
            transform: translateY(40px);
            transition: all 0.8s ease;
        }
        .story-section.visible { opacity: 1; transform: translateY(0); }

        .narrator-tag {
            font-weight: 300;
            font-size: 0.8rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #f5c518;
            margin-bottom: 20px;
        }
        .story-text {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 700;
            line-height: 1.5;
            color: rgba(255,255,255,0.9);
        }
        .story-text .highlight { color: #f5c518; }

        .divider { width: 60px; height: 2px; background: #f5c518; margin: 0 auto; opacity: 0.5; }

        /* ===== BIG ASK ===== */
        .big-ask {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #1a1a2e 0%, #0f0f23 50%, #1a1a2e 100%);
            padding: 40px 20px;
            text-align: center;
        }
        .big-ask-name {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-size: clamp(2.5rem, 8vw, 6rem);
            color: #f5c518;
            text-shadow: 0 0 80px rgba(245,197,24,0.4);
            margin-bottom: 20px;
        }
        .big-ask-question {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: clamp(1.8rem, 5vw, 3.5rem);
            color: #fff;
            line-height: 1.3;
        }
        .big-ask-question .yellow { color: #f5c518; }

        .suit-up {
            margin-top: 50px;
            padding: 20px 60px;
            background: #f5c518;
            color: #1a1a2e;
            border: none;
            font-family: 'Inter', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 4px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .suit-up::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: translateX(-100%);
            transition: transform 0.5s;
        }
        .suit-up:hover::after { transform: translateX(100%); }
        .suit-up:hover { transform: scale(1.05); box-shadow: 0 0 40px rgba(245,197,24,0.5); }

        /* ===== RESPONSE ===== */
        .response-screen {
            display: none;
            position: fixed;
            inset: 0;
            background: #1a1a2e;
            z-index: 200;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
        }
        .response-screen.active { display: flex; }

        .legen {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-size: clamp(2rem, 8vw, 5rem);
            color: #f5c518;
            opacity: 0;
            animation: slamIn 0.5s 0.3s forwards;
        }
        .wait-for-it {
            font-weight: 300;
            font-size: 1.2rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.6);
            margin: 20px 0;
            opacity: 0;
            animation: fadeUp 0.8s 1s forwards;
        }
        .dary {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-size: clamp(3rem, 12vw, 8rem);
            color: #f5c518;
            text-shadow: 0 0 80px rgba(245,197,24,0.5);
            opacity: 0;
            animation: slamIn 0.6s 2.2s forwards;
        }
        .legendary-sub {
            font-weight: 300;
            font-size: 1rem;
            letter-spacing: 4px;
            color: rgba(255,255,255,0.5);
            margin-top: 30px;
            opacity: 0;
            animation: fadeUp 0.8s 3s forwards;
        }

        .confetti { position: fixed; top: -10px; width: 10px; height: 10px; opacity: 0; }
        .response-screen.active .confetti { animation: confettiFall linear forwards; }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }
        @keyframes slamIn {
            0% { opacity: 0; transform: scale(3); }
            70% { transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }
        @keyframes confettiFall {
            0% { opacity: 1; transform: translateY(0) rotate(0deg); }
            100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
        }
    </style>
</head>
<body>

    <!-- INTRO -->
    <div class="intro-screen" id="introScreen">
        <div class="intro-title">
            How I Found<br>My <span class="yellow">Best Man</span>
        </div>
        <div class="umbrella">☂️</div>
        <button class="enter-btn" onclick="enterStory()">Enter</button>
    </div>

    <!-- MAIN -->
    <div class="main-content" id="mainContent">

        <section class="title-card">
            <div class="himym-logo">
                <div class="himym-how">The true story of</div>
                <div class="himym-main-title">How I<br>Asked</div>
                <div class="himym-sub">my best man</div>
            </div>
            <div class="himym-umbrella-large">☂️</div>
        </section>

        <section class="story-section" data-animate>
            <div class="narrator-tag">The Bro Code</div>
            <div class="story-text">
                I'm getting married.<br>I need my <span class="highlight">wingman</span>.
            </div>
        </section>

        <div class="divider"></div>

        <!-- THE ASK -->
        <section class="big-ask" data-animate>
            <div class="big-ask-name">Altemir</div>
            <div class="big-ask-question">
                Will you be my<br><span class="yellow">Best Man</span>?
            </div>
            <button class="suit-up" onclick="suitUp()">SUIT UP! 🤵</button>
        </section>

    </div>

    <!-- RESPONSE -->
    <div class="response-screen" id="responseScreen">
        <div class="legen">Legen...</div>
        <div class="wait-for-it">wait for it</div>
        <div class="dary">DARY!</div>
        <div class="legendary-sub">Let's make this wedding ceremony legendary. 🤵</div>
    </div>

    <script>
        function enterStory() {
            document.getElementById('introScreen').classList.add('hidden');
            document.getElementById('mainContent').classList.add('visible');
            setTimeout(() => {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
                }, { threshold: 0.2 });
                document.querySelectorAll('[data-animate]').forEach(el => observer.observe(el));
            }, 100);
        }

        function suitUp() {
            document.getElementById('responseScreen').classList.add('active');
            const colors = ['#f5c518', '#fff', '#e6b800', '#ffd700', '#ffec8b'];
            const container = document.getElementById('responseScreen');
            for (let i = 0; i < 80; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random() * 100 + 'vw';
                c.style.width = (Math.random() * 10 + 5) + 'px';
                c.style.height = (Math.random() * 10 + 5) + 'px';
                c.style.background = colors[Math.floor(Math.random() * colors.length)];
                c.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                c.style.animationDelay = (Math.random() * 3) + 's';
                c.style.animationDuration = (Math.random() * 3 + 2) + 's';
                container.appendChild(c);
            }
        }
    </script>

</body>
</html>
